<!--
  应用图标矢量源。icon.png 由本文件渲染而来，改图标请改这里再重新渲染。

  取自侧边栏品牌 logo（platform/public/index.html 的 .brand .logo，Lucide bot 图标）。
  配色对齐 CSS 变量：底色 primary = oklch(0.21 0.006 285.9) 渲染为 #18181B
                     线条 primary-foreground = oklch(0.985 0 0) 渲染为 #FAFAFA
  圆角 137/512 = 26.7%，与 app 内 30px 方块配 8px 圆角(r-md) 的比例一致。

  相对 app 内 logo 有两处调整，为的是小尺寸可读性（16/32px 下 1.75 的细线会糊掉）：
    图标占比 56.7% 提到 62%（scale 12.083 提到 13.208）
    stroke-width 1.75 提到 2.4

  重新渲染 icon.png（1024x1024，矢量直出而非放大位图）：
  用 headless Edge 截图本文件，各 flag 前缀双连字符（XML 注释内不能写，故省略）：
    headless  disable-gpu  screenshot=build/icon.png
    window-size=512,512  force-device-scale-factor=2  default-background-color=00000000
  注意 window-size 给 512 配 scale-factor 2 得到 1024 输出，而不是直接给 1024。
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="137" fill="oklch(0.21 0.006 285.9)"/>
  <g transform="translate(97.5,97.5) scale(13.208)"
     fill="none" stroke="oklch(0.985 0 0)" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round">
    <path d="M12 8V4H8"/>
    <rect width="16" height="12" x="4" y="8" rx="2"/>
    <path d="M2 14h2"/>
    <path d="M20 14h2"/>
    <path d="M15 13v2"/>
    <path d="M9 13v2"/>
  </g>
</svg>
